<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Firefly Music Player - Cross-platform music streaming app">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Firefly">
  <meta name="theme-color" content="#121212">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Firefly Music Player</title>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase App Check -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-check-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
    }
    .splash {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #121212 0%, #1E1E1E 50%, #0D0D0D 100%);
    }
    .splash .firefly {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #FFB300 0%, #FF6F00 50%, transparent 100%);
      box-shadow: 0 0 60px #FFB300, 0 0 100px #FF6F00;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="firefly"></div>
  </div>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('flutter_service_worker.js');
      });
    }
    
    // Hide splash when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.style.transition = 'opacity 0.5s';
        splash.style.opacity = '0';
        setTimeout(function() {
          splash.style.display = 'none';
        }, 500);
      }
    });
  </script>
  <script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
