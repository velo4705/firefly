name: firefly
description: "A modern cross-platform music player with yellow/orange/black firefly theme"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  provider: ^6.0.5

  # Audio & Media
  just_audio: ^0.9.36
  audio_session: ^0.1.16
  rxdart: ^0.28.0

  # Network & APIs
  dio: ^5.3.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  path: ^1.8.3
  file_picker: ^6.1.1

  # Media Info
  media_kit: ^1.1.11

  # UI & Animations
  cupertino_icons: ^1.0.8
  lottie: ^2.7.0
  shimmer: ^3.0.0

  # Utils
  permission_handler: ^11.0.1
  url_launcher: ^6.2.1
  package_info_plus: ^4.2.0
  flutter_riverpod: ^2.4.9

  # Notifications
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  # flutter_test:
  #   sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.2
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  # integration_test:
  #   sdk: flutter

flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Web-specific settings
  # The Flutter web renderer to use:
  #   - html: Better compatibility, smaller bundle size
  #   - canvaskit: Consistent performance across platforms
  # @default: html
  web-renderer: html
